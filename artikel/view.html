<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detail Artikel | PB. Istana Beton</title>
<meta name="description" content="Artikel edukasi beton dan konstruksi dari PB. Istana Beton.">

<link rel="stylesheet" href="../css/style.css">

<!-- OPEN GRAPH DEFAULT -->
<meta property="og:type" content="article">
<meta property="og:title" content="">
<meta property="og:description" content="">
<meta property="og:image" content="">
<meta property="og:url" content="">

<style>
.header{background:#111;padding:15px 0}
.header-flex{display:flex;justify-content:space-between;align-items:center}
.logo{height:50px}
.header nav a{color:#fff;text-decoration:none;margin-left:25px;font-size:14px}
.header nav a:hover,.header nav a.active{color:#f0a500}

.page-hero{padding:50px 20px;text-align:center;background:#111;color:#fff}

.container{max-width:900px;margin:auto;padding:40px 20px}
.breadcrumb{font-size:14px;margin-bottom:20px;color:#777}
.breadcrumb a{color:#111;text-decoration:none}

.article-detail{background:#1a1a1a;padding:30px;border-radius:16px}
.article-detail h1{color:#fff;margin-bottom:15px}
.meta{font-size:14px;color:#ccc;margin-bottom:25px}

.article-detail img{width:100%;border-radius:12px;margin:20px 0}
.article-detail p{line-height:1.8;color:#f1f1f1}

.cta-wa{display:block;background:#25D366;color:#fff;text-align:center;padding:14px;border-radius:8px;margin:30px 0;text-decoration:none;font-weight:bold}
.back-btn{display:inline-block;margin-top:20px;padding:10px 18px;background:#111;color:#fff;text-decoration:none;border-radius:8px}

.related{margin-top:50px}
.related-item{padding:15px;border-bottom:1px solid #eee}
.related-item a{text-decoration:none;color:#111;font-weight:bold}

.wa-sticky{position:fixed;bottom:20px;right:20px;background:#25D366;color:#fff;padding:12px 18px;border-radius:50px;text-decoration:none;font-weight:bold;z-index:999}
</style>
</head>
<body>

<header class="header">
  <div class="container header-flex">
    <img src="../assets/logo.jpg" class="logo">
    <nav>
      <a href="../index.html">Beranda</a>
      <a href="../produk/index.html">Produk</a>
      <a href="index.html" class="active">Artikel</a>
      <a href="../kontak.html">Kontak</a>
      <a href="../tentang-kami.html">Tentang Kami</a>
    </nav>
  </div>
</header>

<section class="page-hero">
  <h2>Detail Artikel</h2>
</section>

<div class="container">
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="article-detail" id="articleDetail"></div>
  <div class="related" id="relatedArticles"></div>
</div>

<a href="https://wa.me/6283862786829" target="_blank" class="wa-sticky">
💬 WhatsApp
</a>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../js/supabase.js"></script>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const container = document.getElementById("articleDetail");
const breadcrumb = document.getElementById("breadcrumb");
const relatedContainer = document.getElementById("relatedArticles");

async function loadArticle(){

  if(!id){
    container.innerHTML = "<h2>Artikel tidak ditemukan</h2>";
    return;
  }

  try{

    // GET ARTICLE
    const { data: article, error } = await supabase
      .from("artikel")
      .select("*")
      .eq("id", id)
      .single();

    if(error || !article){
      container.innerHTML = "<h2>Artikel tidak ditemukan</h2>";
      return;
    }

    // UPDATE VIEW
    await supabase
      .from("artikel")
      .update({ views: (article.views || 0) + 1 })
      .eq("id", article.id);

    // BREADCRUMB
    breadcrumb.innerHTML = `
      <a href="../index.html">Beranda</a> /
      <a href="index.html">Artikel</a> /
      ${article.title}
    `;

    // RENDER
    container.innerHTML = `
      <h1>${article.title}</h1>

      <div class="meta">
        ${article.author || "Admin"} • 
        ${new Date(article.created_at).toLocaleDateString("id-ID")} • 
        ${article.category || "Artikel"} • 
        👁 ${(article.views || 0) + 1} dilihat
      </div>

      ${article.thumbnail ? `<img src="${article.thumbnail}" loading="lazy">` : ""}

      <div>${article.content}</div>

      <a class="cta-wa"
         target="_blank"
         href="https://wa.me/6283862786829?text=${encodeURIComponent(
           "Halo PB Istana Beton, saya tertarik setelah membaca artikel: " + article.title
         )}">
         💬 Konsultasi via WhatsApp
      </a>

      <a href="index.html" class="back-btn">← Kembali ke Artikel</a>
    `;

    // SEO OPEN GRAPH
    document.title = article.title + " | PB. Istana Beton";

    document.querySelector("meta[property='og:title']")
      .setAttribute("content", article.title);

    document.querySelector("meta[property='og:description']")
      .setAttribute("content",
        article.content.replace(/<[^>]*>/g,"").substring(0,150)
      );

    document.querySelector("meta[property='og:image']")
      .setAttribute("content", article.thumbnail || "");

    document.querySelector("meta[property='og:url']")
      .setAttribute("content", location.href);

    // RELATED
    const { data: related } = await supabase
      .from("artikel")
      .select("id,title")
      .neq("id", id)
      .limit(3);

    if(related?.length){
      relatedContainer.innerHTML = "<h3>Artikel Lainnya</h3>";

      related.forEach(r => {
        relatedContainer.innerHTML += `
          <div class="related-item">
            <a href="view.html?id=${r.id}">${r.title}</a>
          </div>
        `;
      });
    }

  }catch(err){
    console.error(err);
    container.innerHTML = "<p>Terjadi kesalahan.</p>";
  }
}

loadArticle();
</script>

</body>
</html>
