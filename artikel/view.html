<style>

/* ================= HEADER ================= */

.breadcrumb a:hover{color:#f0a500;}

.article-detail h1{margin-bottom:15px;font-size:28px;}
.meta{font-size:14px;color:#777;margin-bottom:25px;}

.article-detail img,
.article-detail video{
  width:100%;
  border-radius:10px;
  margin:20px 0;
}

  .container{
  max-width:900px;
  margin:auto;
  padding:40px 20px;
}

.article-detail{
  background:#1a1a1a;
  padding:30px;
  border-radius:16px;
}

.article-detail h1{
  margin-bottom:15px;
  font-size:28px;
  color:#fff;
}

.meta{
  font-size:14px;
  color:#ccc;
  margin-bottom:25px;
}

.article-detail p{
  line-height:1.8;
  margin-bottom:18px;
  color:#f1f1f1;
  font-size:16px;
}

.article-detail img,
.article-detail video{
  width:100%;
  border-radius:12px;
  margin:20px 0;
}

.article-detail p{line-height:1.7;margin-bottom:18px;color:#333;}

.cta-wa{
  display:block;
  background:#25D366;
  color:#fff;
  text-align:center;
  padding:14px;
  border-radius:8px;
  margin:30px 0;
  text-decoration:none;
  font-weight:bold;
}

.share-box{
  margin:30px 0;
}

.share-box a{
  display:inline-block;
  margin:5px;
  padding:8px 12px;
  background:#eee;
  border-radius:6px;
  text-decoration:none;

}

  margin-top:50px;
}

  padding:15px;
  border-bottom:1px solid #eee;
}

  text-decoration:none;

}

.back-btn{
  display:inline-block;

/* ================= WA STICKY ================= */

</style>

<body>

<header class="header">
  <div class="container header-flex">
    <img src="../assets/logo.jpg" class="logo">
    <nav>
      <a href="../index.html">Beranda</a>
      <a href="../produk/index.html">Produk</a>
      <a href="index.html" class="active">Artikel</a>
      <a href="../kontak.html">Kontak</a>
      <a href="../tentang-kami.html">Tentang Kami</a>
    </nav>
  </div>
</header>

<section class="page-hero">
  <h2>Detail Artikel</h2>
</section>

<div class="container">
  <div class="breadcrumb" id="breadcrumb"></div>
  <div class="article-detail" id="articleDetail"></div>
  <div class="related" id="relatedArticles"></div>
</div>

<a href="https://wa.me/6283862786829" target="_blank" class="wa-sticky">
💬 WhatsApp
</a>

<script src="artikel.js"></script>
<script type="module">

import { supabase } from "../js/supabase.js";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const container = document.getElementById("articleDetail");
const breadcrumb = document.getElementById("breadcrumb");
const relatedContainer = document.getElementById("relatedArticles");

async function loadArticle(){

  if(!id){
    container.innerHTML = "<h2>Artikel tidak ditemukan</h2>";
    return;
  }

  // =========================
  // Ambil artikel berdasarkan ID
  // =========================
  const { data: article, error } = await supabase
    .from("artikel")
    .select("*")
    .eq("id", id)
    .single();

  if(error || !article){
    container.innerHTML = "<h2>Artikel tidak ditemukan</h2>";
    return;
  }

  // =========================
  // UPDATE VIEW COUNTER
  // =========================
  await supabase
    .from("artikel")
    .update({ views: (article.views || 0) + 1 })
    .eq("id", article.id);

  // =========================
  // Breadcrumb
  // =========================
  breadcrumb.innerHTML = `
    <a href="../index.html">Beranda</a> /
    <a href="index.html">Artikel</a> /
    ${article.title}
  `;

  // =========================
  // Render Artikel
  // =========================
  container.innerHTML = `
    <h1>${article.title}</h1>

    <div class="meta">
      ${article.author ?? "Admin"} • 
      ${new Date(article.created_at).toLocaleDateString("id-ID")} • 
      ${article.category ?? "Artikel"} • 
      👁 ${(article.views ?? 0) + 1} dilihat
    </div>

    ${article.thumbnail ? `<img src="${article.thumbnail}" alt="${article.title}">` : ""}

    <div>${article.content}</div>

    <a class="cta-wa"
       target="_blank"
       href="https://wa.me/6283862786829?text=${encodeURIComponent(
         "Halo PB Istana Beton, saya tertarik setelah membaca artikel: " + article.title
       )}">
       💬 Konsultasi & Tanya Harga via WhatsApp
    </a>

    <a href="index.html" class="back-btn">← Kembali ke Artikel</a>
  `;

  // =========================
  // Update Open Graph
  // =========================
  document.querySelector("meta[property='og:title']")
    .setAttribute("content", article.title);

  document.querySelector("meta[property='og:description']")
    .setAttribute(
      "content",
      article.content.replace(/<[^>]*>/g, "").substring(0,150)
    );

  document.querySelector("meta[property='og:image']")
    .setAttribute("content", article.thumbnail ?? "");

  document.querySelector("meta[property='og:url']")
    .setAttribute("content", window.location.href);

  // =========================
  // Artikel Terkait
  // =========================
  const { data: related } = await supabase
    .from("artikel")
    .select("*")
    .neq("id", id)
    .limit(3);

  if(related && related.length){

    relatedContainer.innerHTML = "<h3>Artikel Lainnya</h3>";

    related.forEach(r => {
      relatedContainer.innerHTML += `
        <div class="related-item">
          <a href="view.html?id=${r.id}">${r.title}</a>
        </div>
      `;
    });

  }

}

loadArticle();

</script>

</body>
</html>
