<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Artikel | PB. Istana Beton</title>
<meta name="description" content="Artikel PB Istana Beton">

<!-- Open Graph -->
<meta property="og:type" content="article">
<meta property="og:title" content="">
<meta property="og:description" content="">
<meta property="og:image" content="">
<meta property="og:url" content="">

<link rel="stylesheet" href="../css/style.css">

<style>
.container{max-width:900px;margin:auto;padding:40px 20px}
.article{background:#1a1a1a;padding:30px;border-radius:16px;color:#fff}
.meta{color:#ccc;font-size:14px;margin-bottom:20px}
.article img{width:100%;border-radius:10px;margin:20px 0}
.cta{display:block;margin-top:30px;background:#25D366;padding:14px;text-align:center;border-radius:8px;color:#fff;text-decoration:none;font-weight:bold}
.back{display:inline-block;margin-top:20px;color:#ccc}
</style>
</head>
<body>

<div class="container">
  <div id="article"></div>
</div>

<!-- SCRIPT URUTAN WAJIB -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="artikel.js"></script>
<script src="router.js"></script>

<script>
async function loadArticle(){

  const slug = getSlug();

  if(!slug){
    document.getElementById("article").innerHTML="Artikel tidak ditemukan";
    return;
  }

  const artikel = await ArtikelAPI.getArticleBySlug(slug);

  if(!artikel){
    document.getElementById("article").innerHTML="Artikel tidak ditemukan";
    return;
  }

  // Update views
  ArtikelAPI.updateArticleViews(artikel.id, artikel.views);

  // Render
  document.getElementById("article").innerHTML=`
    <div class="article">
      <h1>${artikel.title}</h1>

      <div class="meta">
        ${artikel.author || "Admin"} • 
        ${new Date(artikel.created_at).toLocaleDateString("id-ID")} • 
        👁 ${(artikel.views||0)+1}
      </div>

      ${artikel.thumbnail ? `<img src="${artikel.thumbnail}">` : ""}

      <div>${artikel.content}</div>

      <a class="cta"
         target="_blank"
         href="https://wa.me/6283862786829?text=${encodeURIComponent(
           "Halo, saya tertarik setelah membaca artikel: "+artikel.title
         )}">
         💬 Konsultasi via WhatsApp
      </a>

      <a href="/artikel/index.html" class="back">← Kembali ke artikel</a>
    </div>
  `;

  /* ================= SEO DINAMIS ================= */
  document.title = artikel.title + " | PB. Istana Beton";

  document.querySelector('meta[name="description"]')
    .setAttribute("content", artikel.meta_desc || artikel.title);

  document.querySelector("meta[property='og:title']")
    .setAttribute("content", artikel.title);

  document.querySelector("meta[property='og:description']")
    .setAttribute("content", artikel.meta_desc || artikel.title);

  document.querySelector("meta[property='og:image']")
    .setAttribute("content", artikel.thumbnail || "");

  document.querySelector("meta[property='og:url']")
    .setAttribute("content", window.location.href);
}

loadArticle();
</script>

</body>
</html>
