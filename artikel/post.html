<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Memuat artikel...</title>
<meta name="description" content="Artikel PB Istana Beton">

<!-- Open Graph -->
<meta property="og:type" content="article">
<meta property="og:title" content="">
<meta property="og:description" content="">
<meta property="og:image" content="">
<meta property="og:url" content="">

<link rel="stylesheet" href="../css/style.css">

<style>
body{background:#0f0f0f;color:#fff;font-family:sans-serif}
.container{max-width:900px;margin:auto;padding:40px 20px}

.article{
  background:#1a1a1a;
  padding:30px;
  border-radius:16px;
  box-shadow:0 10px 30px rgba(0,0,0,.4)
}

.article h1{margin-bottom:15px;font-size:28px}

.meta{color:#aaa;font-size:14px;margin-bottom:25px}

.article img,.article video{
  width:100%;
  border-radius:12px;
  margin:20px 0
}

.article p{line-height:1.8;margin-bottom:16px;color:#eee}

.cta{
  display:block;
  margin-top:30px;
  background:#25D366;
  padding:14px;
  text-align:center;
  border-radius:8px;
  color:#fff;
  text-decoration:none;
  font-weight:bold;
  transition:.2s
}
.cta:hover{transform:scale(1.02)}

.back{
  display:inline-block;
  margin-top:25px;
  color:#bbb;
  text-decoration:none;
}
.back:hover{color:#fff}
</style>
</head>
<body>

<div class="container">
  <div id="article">Memuat artikel...</div>
</div>

<!-- GLOBAL SCRIPT -->
<script src="editor.js"></script> <!-- optional future reuse -->

<!-- MODULE SCRIPT -->
<script type="module">
import { ArtikelAPI } from "./artikel.js";
import { supabase } from "../js/supabase.js";
import { getSlug } from "./router.js";

const el = document.getElementById("article");

async function loadArticle(){
  try{
    const slug = getSlug();

    if(!slug){
      el.innerHTML = "Artikel tidak ditemukan";
      return;
    }

    const artikel = await ArtikelAPI.getArticleBySlug(slug);

    if(!artikel){
      el.innerHTML = "Artikel tidak ditemukan";
      return;
    }

    /* ================= UPDATE VIEW ================= */
    ArtikelAPI.updateArticleViews(artikel.id, artikel.views || 0);

    /* ================= RENDER ================= */
    el.innerHTML = `
      <div class="article">
        <h1>${artikel.title}</h1>

        <div class="meta">
          ${artikel.author || "Admin"} • 
          ${new Date(artikel.created_at).toLocaleDateString("id-ID")} • 
          👁 ${(artikel.views || 0) + 1}
        </div>

        ${artikel.thumbnail ? `<img src="${artikel.thumbnail}" loading="lazy">` : ""}

        <div>${artikel.content}</div>

        <a class="cta"
           target="_blank"
           href="https://wa.me/6283862786829?text=${encodeURIComponent(
             "Halo PB Istana Beton, saya tertarik setelah membaca artikel: " + artikel.title
           )}">
           💬 Konsultasi via WhatsApp
        </a>

        <a href="/artikel/index.html" class="back">← Kembali ke artikel</a>
      </div>
    `;

    /* ================= SEO DINAMIS ================= */
    const title = artikel.title + " | PB. Istana Beton";
    const desc = artikel.meta_desc || artikel.title;
    const image = artikel.thumbnail || "";

    document.title = title;

    document.querySelector('meta[name="description"]')
      .setAttribute("content", desc);

    document.querySelector("meta[property='og:title']")
      .setAttribute("content", title);

    document.querySelector("meta[property='og:description']")
      .setAttribute("content", desc);

    document.querySelector("meta[property='og:image']")
      .setAttribute("content", image);

    document.querySelector("meta[property='og:url']")
      .setAttribute("content", window.location.href);

  }catch(err){
    console.error(err);
    el.innerHTML = "Terjadi kesalahan memuat artikel";
  }
}

loadArticle();
</script>

</body>
</html>
