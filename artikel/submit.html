<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Tulis Artikel</title>
<link rel="stylesheet" href="../css/style.css">

<style>

.container{
  max-width:700px;
  margin:auto;
  padding:40px 20px;
}

form{
  display:flex;
  flex-direction:column;
  gap:15px;
}

input, textarea, select{
  padding:12px;
  border-radius:8px;
  border:1px solid #ccc;
}

textarea{
  min-height:200px;
}

button{
  padding:12px;
  background:#111;
  color:#fff;
  border:none;
  border-radius:8px;
  cursor:pointer;
}

.preview img, .preview video{
  width:100%;
  margin-top:10px;
  border-radius:10px;
}

</style>
</head>
<body>

<div class="container">
  <h1>Tulis Artikel</h1>
  
  <a href="index.html" class="back">← Kembali ke Artikel</a>

  <form id="formArtikel">
    <input type="text" id="title" placeholder="Judul Artikel" required>
    <input type="text" id="author" placeholder="Nama Penulis" required>
    <input type="date" id="date" required>

    <select id="category" required>
      <option value="">Pilih Kategori</option>
      <option>Tips & Tutorial</option>
      <option>Edukasi Material</option>
      <option>Inspirasi Desain</option>
    </select>

    <!-- UPLOAD FOTO / VIDEO -->
    <input type="file" id="media" accept="image/*,video/*" multiple required>

    <div class="preview" id="preview"></div>

    <textarea id="content" placeholder="Isi Artikel..." required></textarea>

    <button type="submit">Publikasikan</button>
  </form>
</div>

<script src="artikel.js"></script>
<script type="module">

import { supabase } from "../js/supabase.js";

const form = document.getElementById("formArtikel");
const mediaInput = document.getElementById("media");
const preview = document.getElementById("preview");

let selectedFile = null;

// ============================
// PREVIEW MEDIA
// ============================
mediaInput.addEventListener("change", function(){

  preview.innerHTML = "";
  selectedFile = this.files[0];

  if(!selectedFile) return;

  const reader = new FileReader();

  reader.onload = function(e){

    if(selectedFile.type.startsWith("image")){
      preview.innerHTML = `<img src="${e.target.result}">`;
    }else{
      preview.innerHTML = `<video src="${e.target.result}" controls></video>`;
    }

  };

  reader.readAsDataURL(selectedFile);
});


// ============================
// SUBMIT ARTIKEL
// ============================
form.addEventListener("submit", async function(e){

  e.preventDefault();

  const title = document.getElementById("title");
  const author = document.getElementById("author");
  const category = document.getElementById("category");
  const content = document.getElementById("content");
  const date = document.getElementById("date");

  if(!selectedFile){
    alert("Pilih gambar terlebih dahulu");
    return;
  }

  // ============================
  // 1️⃣ Upload ke Storage
  // ============================
  const fileName = Date.now() + "_" + selectedFile.name;

  const { error: uploadError } =
    await supabase.storage
      .from("artikel-media")
      .upload(fileName, selectedFile);

  if(uploadError){
    console.error(uploadError);
    alert("Upload media gagal");
    return;
  }

  // ============================
  // 2️⃣ Ambil Public URL
  // ============================
  const { data: publicUrl } =
    supabase.storage
      .from("artikel-media")
      .getPublicUrl(fileName);

  // ============================
  // 3️⃣ Generate Slug
  // ============================
  const slug = title.value
    .toLowerCase()
    .replace(/[^\w ]+/g,'')
    .replace(/ +/g,'-');

  // ============================
  // 4️⃣ Insert ke Database
  // ============================
  const { error } = await supabase
    .from("artikel")
    .insert([{
      slug: slug,
      title: title.value,
      author: author.value,
      category: category.value,
      content: "<p>" + content.value.replace(/\n/g,"</p><p>") + "</p>",
      thumbnail: publicUrl.publicUrl,
      media: publicUrl.publicUrl,
      views: 0,
      created_at: date.value
    }]);

  if(error){
    console.error(error);
    alert("Gagal menyimpan artikel");
    return;
  }

  alert("Artikel berhasil dipublikasikan!");

  window.location.href = "index.html";

});

</script>
  
</body>
</html>
