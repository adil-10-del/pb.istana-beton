<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tulis Artikel | PB. Istana Beton</title>
<meta name="robots" content="noindex">

<link rel="stylesheet" href="../css/style.css">

<style>
.container{max-width:800px;margin:auto;padding:40px 20px}
form{display:flex;flex-direction:column;gap:15px}
input,select{padding:12px;border-radius:8px;border:1px solid #ccc}
.editor-toolbar{display:flex;gap:8px;flex-wrap:wrap}
.editor-toolbar button{padding:8px 10px;border:none;background:#111;color:#fff;border-radius:6px;cursor:pointer}
.editor{
  min-height:250px;
  border:1px solid #ccc;
  border-radius:8px;
  padding:12px;
  background:#fff;
  color:#111; /* TAMBAH INI */
}

.editor *{
  color:#111;
}
.preview img,.preview video{width:100%;margin-top:10px;border-radius:10px}
button.submit{padding:14px;background:#111;color:#fff;border:none;border-radius:8px;cursor:pointer}
.back{margin-bottom:15px;display:inline-block;color:#666;text-decoration:none}
</style>
</head>
<body>

<div class="container">
  <h1>Tulis Artikel</h1>
  <a href="index.html" class="back">← Kembali ke Artikel</a>

  <form id="formArtikel">

    <input type="text" id="title" placeholder="Judul Artikel" required>
    <input type="text" id="author" placeholder="Penulis" value="Admin">

    <select id="category">
      <option value="">Kategori</option>
      <option>Tips & Tutorial</option>
      <option>Edukasi Material</option>
      <option>Inspirasi Desain</option>
    </select>

    <!-- MEDIA -->
    <input type="file" id="media" accept="image/*,video/*" required>
    <div class="preview" id="preview"></div>

    <!-- TOOLBAR (INI YANG KAMU TANYA) -->
    <div class="editor-toolbar">
      <button type="button" onclick="Editor.bold()"><b>B</b></button>
      <button type="button" onclick="Editor.italic()"><i>I</i></button>
      <button type="button" onclick="Editor.list()">• List</button>
      <button type="button" onclick="Editor.h2()">H2</button>
      <button type="button" onclick="Editor.paragraph()">P</button>
    </div>

    <!-- EDITOR -->
    <div id="editor" class="editor" contenteditable="true">
      Tulis artikel di sini...
    </div>

    <button type="submit" class="submit">Publikasikan</button>

  </form>
</div>

<!-- SCRIPT URUTAN WAJIB -->

<script>
Editor.init("editor"); // INI JUGA YANG KAMU TANYA

const form = document.getElementById("formArtikel");
const mediaInput = document.getElementById("media");
const preview = document.getElementById("preview");

let selectedFile = null;

/* ================= PREVIEW MEDIA ================= */
mediaInput.addEventListener("change", function(){
  preview.innerHTML="";
  selectedFile=this.files[0];
  if(!selectedFile) return;

  const reader=new FileReader();
  reader.onload=e=>{
    if(selectedFile.type.startsWith("image")){
      preview.innerHTML=`<img src="${e.target.result}">`;
    }else{
      preview.innerHTML=`<video src="${e.target.result}" controls></video>`;
    }
  };
  reader.readAsDataURL(selectedFile);
});

/* ================= SUBMIT ================= */
form.addEventListener("submit", async e=>{
  e.preventDefault();

  const title=document.getElementById("title").value.trim();
  const author=document.getElementById("author").value.trim()||"Admin";
  const category=document.getElementById("category").value;

  // INI YANG KAMU TANYA 👇
  const content = Editor.getHTML();
  const meta_desc = Editor.makeMetaDesc(Editor.getText());
  const slug = Editor.makeSlug(title);

  if(!selectedFile){
    alert("Upload media dulu");
    return;
  }

  try{
    const fileName=Date.now()+"_"+selectedFile.name;

    // upload media
    const { error:uploadError }=
      await supabase.storage.from("artikel-media").upload(fileName,selectedFile);

    if(uploadError) throw uploadError;

    const { data:urlData }=
      supabase.storage.from("artikel-media").getPublicUrl(fileName);

    const mediaUrl=urlData.publicUrl;

    // save artikel
    const res = await ArtikelAPI.saveArticle({
      slug,
      title,
      author,
      category,
      content,
      thumbnail:mediaUrl,
      media:mediaUrl,
      meta_desc
    });

    if(!res.success) throw res.error;

    alert("Artikel berhasil 🚀");

    window.location.href=`/artikel/${slug}.html`;

  }catch(err){
    console.error(err);
    alert("Gagal publish artikel");
  }
});
</script>

</body>
</html>
