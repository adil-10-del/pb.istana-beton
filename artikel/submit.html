<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tulis Artikel | PB. Istana Beton</title>
<meta name="robots" content="noindex">

<link rel="stylesheet" href="../css/style.css">

<style>

.container{
max-width:800px;
margin:auto;
padding:40px 20px
}

h1{margin-bottom:20px}

form{
display:flex;
flex-direction:column;
gap:15px
}

input,select{
padding:12px;
border-radius:8px;
border:1px solid #ccc;
font-size:14px
}

.editor-toolbar{
display:flex;
gap:10px;
flex-wrap:wrap
}

.editor-toolbar button{
padding:8px 10px;
border:none;
background:#111;
color:#fff;
border-radius:6px;
cursor:pointer
}

.editor{
min-height:250px;
border:1px solid #ccc;
border-radius:8px;
padding:12px;
background:#fff
}

.preview img,.preview video{
width:100%;
margin-top:10px;
border-radius:10px
}

button.submit{
padding:14px;
background:#111;
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
font-size:16px
}

.back{
display:inline-block;
margin-bottom:15px;
color:#666;
text-decoration:none
}

.loading{
opacity:.6;
pointer-events:none
}

</style>
</head>
<body>

<div class="container">
  <h1>Tulis Artikel</h1>
  <a href="index.html" class="back">← Kembali ke Artikel</a>

  <form id="formArtikel">

    <input type="text" id="title" placeholder="Judul Artikel" required>

    <input type="text" id="author" placeholder="Nama Penulis" value="Admin">

    <select id="category">
      <option value="">Kategori</option>
      <option>Tips & Tutorial</option>
      <option>Edukasi Material</option>
      <option>Inspirasi Desain</option>
    </select>

    <!-- MEDIA -->
    <input type="file" id="media" accept="image/*,video/*" required>
    <div class="preview" id="preview"></div>

    <!-- TOOLBAR -->
    <div class="editor-toolbar">
      <button type="button" onclick="cmd('bold')"><b>B</b></button>
      <button type="button" onclick="cmd('italic')"><i>I</i></button>
      <button type="button" onclick="cmd('insertUnorderedList')">• List</button>
      <button type="button" onclick="cmd('formatBlock','h2')">H2</button>
      <button type="button" onclick="cmd('formatBlock','p')">P</button>
    </div>

    <!-- EDITOR -->
    <div id="editor" class="editor" contenteditable="true">
      Tulis isi artikel di sini...
    </div>

    <button type="submit" class="submit">Publikasikan Artikel</button>

  </form>
</div>

<!-- SCRIPTS -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="../js/supabase.js"></script>
<script src="artikel.js"></script>

<script>
const form = document.getElementById("formArtikel");
const mediaInput = document.getElementById("media");
const preview = document.getElementById("preview");
const editor = document.getElementById("editor");

let selectedFile = null;

/* ================= RICH EDITOR ================= */
function cmd(command, value=null){
  document.execCommand(command,false,value);
}

/* ================= PREVIEW MEDIA ================= */
mediaInput.addEventListener("change",function(){
  preview.innerHTML="";
  selectedFile=this.files[0];
  if(!selectedFile) return;

  const reader=new FileReader();
  reader.onload=e=>{
    if(selectedFile.type.startsWith("image")){
      preview.innerHTML=`<img src="${e.target.result}">`;
    }else{
      preview.innerHTML=`<video src="${e.target.result}" controls></video>`;
    }
  };
  reader.readAsDataURL(selectedFile);
});

/* ================= SUBMIT ================= */
form.addEventListener("submit", async e=>{
  e.preventDefault();
  form.classList.add("loading");

  const title=document.getElementById("title").value.trim();
  const author=document.getElementById("author").value.trim()||"Admin";
  const category=document.getElementById("category").value;
  const content=editor.innerHTML.trim();

  if(!selectedFile){
    alert("Upload media dulu");
    form.classList.remove("loading");
    return;
  }

  /* ===== SLUG SEO ===== */
  const slug=title
    .toLowerCase()
    .replace(/[^\w ]+/g,'')
    .replace(/ +/g,'-');

  /* ===== META DESC AUTO ===== */
  const metaDesc=content
    .replace(/<[^>]*>/g,"")
    .substring(0,150);

  try{

    /* ===== UPLOAD MEDIA ===== */
    const fileName=Date.now()+"_"+selectedFile.name;

    const { error:uploadError }=
      await supabase.storage
      .from("artikel-media")
      .upload(fileName,selectedFile);

    if(uploadError) throw uploadError;

    const { data:urlData }=
      supabase.storage
      .from("artikel-media")
      .getPublicUrl(fileName);

    const mediaUrl=urlData.publicUrl;

    /* ===== SAVE DB ===== */
    const result=await ArtikelAPI.saveArticle({
      slug,
      title,
      author,
      category,
      content,
      thumbnail:mediaUrl,
      media:mediaUrl,
      meta_desc:metaDesc
    });

    if(!result.success) throw result.error;

    alert("Artikel berhasil dipublish 🚀");

    /* Redirect ke halaman SEO */
    window.location.href=`/artikel/${slug}.html`;

  }catch(err){
    console.error(err);
    alert("Gagal publish artikel");
  }

  form.classList.remove("loading");
});
</script>

</body>
</html>
