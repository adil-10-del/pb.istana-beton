<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Tulis Artikel | PB. Istana Beton</title>
<link rel="stylesheet" href="../css/style.css">

<style>
.container{max-width:700px;margin:auto;padding:40px 20px}
form{display:flex;flex-direction:column;gap:15px}
input,textarea,select{padding:12px;border-radius:8px;border:1px solid #ccc}
textarea{min-height:200px}
button{padding:12px;background:#111;color:#fff;border:none;border-radius:8px;cursor:pointer}

.preview img,.preview video{width:100%;margin-top:10px;border-radius:10px}

.back{display:inline-block;margin-bottom:15px;text-decoration:none;color:#111}
</style>
</head>
<body>

<div class="container">
  <h1>Tulis Artikel</h1>
  <a href="index.html" class="back">← Kembali ke Artikel</a>

  <form id="formArtikel">
    <input type="text" id="title" placeholder="Judul Artikel" required>
    <input type="text" id="author" placeholder="Nama Penulis" required>
    <input type="date" id="date" required>

    <select id="category" required>
      <option value="">Pilih Kategori</option>
      <option>Tips & Tutorial</option>
      <option>Edukasi Material</option>
      <option>Inspirasi Desain</option>
    </select>

    <input type="file" id="media" accept="image/*,video/*" required>
    <div class="preview" id="preview"></div>

    <textarea id="content" placeholder="Isi Artikel..." required></textarea>

    <button type="submit">Publikasikan</button>
  </form>
</div>

<!-- SUPABASE -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>
<script src="../js/supabase.js"></script>
<script src="artikel.js"></script>

<script>
const form = document.getElementById("formArtikel");
const mediaInput = document.getElementById("media");
const preview = document.getElementById("preview");

let selectedFile = null;

// PREVIEW MEDIA
mediaInput.addEventListener("change", function(){
  preview.innerHTML = "";
  selectedFile = this.files[0];

  if(!selectedFile) return;

  const url = URL.createObjectURL(selectedFile);

  if(selectedFile.type.startsWith("image")){
    preview.innerHTML = `<img src="${url}">`;
  }else{
    preview.innerHTML = `<video src="${url}" controls></video>`;
  }
});

// SUBMIT
form.addEventListener("submit", async function(e){
  e.preventDefault();

  const title = document.getElementById("title").value.trim();
  const author = document.getElementById("author").value.trim();
  const category = document.getElementById("category").value;
  const content = document.getElementById("content").value;
  const date = document.getElementById("date").value;

  if(!selectedFile){
    alert("Pilih media terlebih dahulu");
    return;
  }

  try{

    // ================= UPLOAD STORAGE
    const fileName = Date.now() + "_" + selectedFile.name;

    const { error: uploadError } = await supabase.storage
      .from("artikel-media")
      .upload(fileName, selectedFile);

    if(uploadError) throw uploadError;

    // ================= GET URL
    const { data } = supabase.storage
      .from("artikel-media")
      .getPublicUrl(fileName);

    const mediaUrl = data.publicUrl;

    // ================= SLUG
    const slug = title
      .toLowerCase()
      .replace(/[^\w ]+/g,'')
      .replace(/ +/g,'-');

    // ================= FORMAT HTML CONTENT
    const htmlContent = "<p>" + content.replace(/\n/g,"</p><p>") + "</p>";

    // ================= INSERT DB
    const { error } = await supabase
      .from("artikel")
      .insert([{
        slug,
        title,
        author,
        category,
        content: htmlContent,
        thumbnail: mediaUrl,
        media: mediaUrl,
        views: 0,
        created_at: date
      }]);

    if(error) throw error;

    alert("Artikel berhasil dipublikasikan!");
    window.location.href = "index.html";

  }catch(err){
    console.error(err);
    alert("Gagal upload artikel");
  }
});
</script>

</body>
</html>
